name: Ingest — Fediverse (30分)

on:
  schedule:
    # 毎時 0分・30分（GitHub Actions cron は最短5分）
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/ingest/package.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts/ingest

      - name: Run Fediverse ingest
        run: npm run fediverse
        working-directory: scripts/ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
