name: コードレビュー (Flutter)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  flutter_analyze:
    name: Flutter 静的解析
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Flutter をセットアップ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 依存関係をインストール
        run: flutter pub get

      - name: Flutter 静的解析を実行
        run: flutter analyze --fatal-infos

  flutter_test:
    name: Flutter テスト
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Flutter をセットアップ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 依存関係をインストール
        run: flutter pub get

      - name: CI 用ダミー .env を作成
        run: |
          cat <<'EOF' > .env
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_ANON_KEY=placeholder_anon_key
          GOOGLE_MAPS_KEY_ANDROID=placeholder
          GOOGLE_MAPS_KEY_IOS=placeholder
          REVENUECAT_KEY_ANDROID=placeholder
          REVENUECAT_KEY_IOS=placeholder
          ADMOB_BANNER_ANDROID=ca-app-pub-3940256099942544/6300978111
          ADMOB_BANNER_IOS=ca-app-pub-3940256099942544/2934735716
          ADMOB_REWARDED_ANDROID=ca-app-pub-3940256099942544/5224354917
          ADMOB_REWARDED_IOS=ca-app-pub-3940256099942544/1712485313
          SUPABASE_SERVICE_ROLE_KEY=placeholder
          SENTRY_DSN=placeholder
          EOF

      - name: テストを実行
        run: flutter test
