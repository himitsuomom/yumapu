name: コードレビュー (Flutter)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  flutter_analyze:
    name: Flutter 静的解析
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Flutter をセットアップ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 依存関係をインストール
        run: flutter pub get

      - name: Flutter 静的解析を実行 (reviewdog)
        uses: reviewdog/action-dartanalyzer@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_on_error: false

  flutter_test:
    name: Flutter テスト
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Flutter をセットアップ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 依存関係をインストール
        run: flutter pub get

      - name: テストを実行
        run: flutter test --coverage

      - name: 型チェック（analyze）
        run: flutter analyze --fatal-infos
