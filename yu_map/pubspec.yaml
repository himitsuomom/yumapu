name: yu_map
description: A social map application for hot springs, public baths, and saunas in Japan.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Supabase
  supabase_flutter: ^2.8.0

  # Maps
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1

  # Camera & Images
  image_picker: ^1.1.2

  # Ads & Monetization
  google_mobile_ads: ^5.3.0
  purchases_flutter: ^8.3.0

  # Analytics
  firebase_core: ^3.8.1
  firebase_analytics: ^11.4.1
  sentry_flutter: ^8.12.0

  # Storage
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.4

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.1
  equatable: ^2.0.7
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
