name: yu_map
description: A social map application for hot springs, public baths, and saunas in Japan.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # Maps
  google_maps_flutter: ^2.5.0
  google_maps_cluster_manager: ^3.0.0
  geolocator: ^10.0.0
  
  # UI
  cupertino_icons: ^1.0.2
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  
  # Camera & Images
  camera: ^0.10.5
  image: ^4.1.0
  image_picker: ^1.0.4
  
  # Ads & Monetization
  google_mobile_ads: ^4.0.0
  purchases_flutter: ^6.0.0
  
  # Analytics
  firebase_core: ^2.24.2
  firebase_analytics: ^10.6.0
  sentry_flutter: ^7.13.0
  
  # Storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Utils
  uuid: ^4.2.1
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.3
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
