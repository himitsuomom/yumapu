name: yu_map
description: A social map application for hot springs, public baths, and saunas in Japan.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Environment Configuration
  flutter_dotenv: ^5.1.0
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # Maps（APIキー不要・完全無料）
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^10.0.0
  
  # UI
  cupertino_icons: ^1.0.2
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  confetti: ^0.7.0
  photo_view: ^0.15.0
  
  # Camera & Images
  image: ^4.1.0
  image_picker: ^1.0.4
  
  # Ads & Monetization
  google_mobile_ads: ^4.0.0
  purchases_flutter: 9.12.0
  
  # Analytics & Push Notifications
  firebase_core: ^2.24.2
  firebase_analytics: ^10.6.0
  firebase_messaging: ^14.6.0
  flutter_local_notifications: ^17.0.0
  sentry_flutter: 9.13.0
  
  # Storage
  flutter_secure_storage: ^9.0.0

  # Splash screen（main.dart で FlutterNativeSplash.preserve/remove を呼ぶため本体依存）
  flutter_native_splash: ^2.3.10

  # Routing & Navigation
  url_launcher: ^6.2.0
  http: ^1.2.0
  share_plus: ^12.0.2
  # Deep Linking: カスタムURLスキーム(yumap://)のハンドリング
  app_links: ^6.3.4

  # Utils
  path_provider: ^2.1.0
  uuid: ^4.2.1
  intl: ^0.20.2
  equatable: ^2.0.5
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.3
  mocktail: ^1.0.0
  # スプラッシュ画面生成ツール（コード生成用、依存はdependencies側に記載）
  # `flutter pub run flutter_native_splash:create` でネイティブスプラッシュを生成する

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
